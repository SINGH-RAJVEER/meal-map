services:
  app:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /app
    command: bun --bun run vite dev --host 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/calorie_tracker}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - bun_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: calorie_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calorie_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bun_modules:
  postgres_data:
